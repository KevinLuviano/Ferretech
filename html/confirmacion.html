<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FerreTech: Confirmación de pago exitoso.">
    <title>FerreTech - Pago Exitoso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="../Css/confirmacion.css" rel="stylesheet">
    <link href="../Css/header.css" rel="stylesheet">
    <link href="../Css/footer.css" rel="stylesheet">
</head>
 
<body>
  
    <div id="header-placeholder"></div>

    <main class="container my-4">
        
        <nav class="text-center text-muted my-4">
            <small>1. Carrito &nbsp;➔&nbsp; 2. Envío y Pago &nbsp;➔&nbsp; <strong class="text-dark">3. Confirmación</strong></small>
        </nav>

        <section class="contenedor-confirmacion p-4 p-md-5 text-center shadow-sm">
            
            <div class="icono-exito mb-3">✓</div>
            
            <h1 class="titulo-exito h2 mb-3">¡Pago Exitoso!</h1>
            <p class="text-muted mb-4">
                Tu pedido ha sido procesado correctamente. 
            </p>

            <div class="resumen-pedido p-3 rounded text-start">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-secondary">Estado del pago:</span>
                    <span class="fw-bold text-success">Aprobado</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-secondary">Método de pago:</span>
                    <span class="text-dark">Tarjeta de Crédito</span>
                </div>
                <div class="d-flex justify-content-between pt-2 border-top">
                    <span class="fw-bold text-dark">Total Pagado:</span>
                    <span class="fw-bold text-dark">$1,145.00 MXN</span>
                </div>
            </div>

           

        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Cargar Header
            fetch('header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                });

            // Cargar Footer
            fetch('footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });
        });
    </script>
</body>
</html>
