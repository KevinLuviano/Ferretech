<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FerreTech: Panel de administración de inventario crítico.">
    <title>FerreTech - PanelAdmi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="PanelAdmi.css" rel="stylesheet">
    <link href="header.css" rel="stylesheet">
    <link href="footer.css" rel="stylesheet">
</head>
<body>
  
    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="row mb-4">
            <div class="col">
                <h1 class="display-6 fw-bold border border-dark d-inline-block px-4 py-1" style="color: #000000;">
                    Inventario
                </h1>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-corporativo text-white text-center py-2 border-0">
                <h4 class="mb-0 fw-semibold" style="letter-spacing: 0.5px;">Inventario Crítico</h4>
            </div>
            
            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center align-middle mb-0 tabla-inventario">
                    <thead>
                        <tr>
                            <th>IDENTIFICACIÓN</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold">F-001</td>
                            <td>Rotomartillo</td>
                            <td>H. electricas</td>
                            <td>45</td>
                            <td>$500</td>
                            <td>
                                <a href="reabastecer.html?id=F-001" class="btn-accion-tabla mb-1">Reabastecer</a>
                                <a href="gestionar.html?id=F-001" class="btn-accion-tabla">gestionar</a>
                            </td>
                        </tr>
                        <tr>
                            <td class="fw-bold">F-S0055</td>
                            <td>Taquete</td>
                            <td>Fijacion</td>
                            <td>250</td>
                            <td>$25</td>
                            <td>
                                <a href="reabastecer.html?id=F-S0055" class="btn-accion-tabla mb-1">Reabastecer</a>
                                <a href="gestionar.html?id=F-S0055" class="btn-accion-tabla">gestionar</a>
                            </td>
                        </tr>
                        <tr>
                            <td class="fw-bold">F-5558</td>
                            <td>Pulidora</td>
                            <td>H.electricas</td>
                            <td>5</td>
                            <td>$700</td>
                            <td>
                                <a href="reabastecer.html?id=F-5558" class="btn-accion-tabla mb-1">Reabastecer</a>
                                <a href="gestionar.html?id=F-5558" class="btn-accion-tabla">gestionar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Nombre estático del administrador para la fase HTML/CSS
            const nombreAdministrador = "Juan Pérez (Admin)";

            // 1. Cargar Header e inyectar el distintivo de Administrador
            fetch('header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    
                    // Busca la barra de navegación del header.html para meter el nombre
                    const navContenedor = document.querySelector('#header-placeholder .navbar-nav, #header-placeholder .navbar');
                    if (navContenedor) {
                        // Lo añade al extremo derecho
                        navContenedor.insertAdjacentHTML('beforeend', `
                            <div class="ms-auto d-flex align-items-center">
                                <span class="badge-admin">👤 Módulo: ${nombreAdministrador}</span>
                            </div>
                        `);
                    }
                })
                .catch(err => console.error("Error cargando el header:", err));

            // 2. Cargar Footer
            fetch('footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(err => console.error("Error cargando el footer:", err));
        });
    </script>
</body>
</html>
